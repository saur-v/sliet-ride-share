version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sliet-rideshare

  # ── Redis (optional — for Socket.IO scaling) ──────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  # ── Backend ───────────────────────────────────────────────────────────────────
  server:
    build: ./server
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/sliet-rideshare
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    volumes:
      - ./server/src:/app/src   # hot-reload in dev (remove in prod)

  # ── Frontend ─────────────────────────────────────────────────────────────────
  client:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - server

volumes:
  mongo_data:
